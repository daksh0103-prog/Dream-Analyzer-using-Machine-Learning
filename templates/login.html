{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:420px; margin:4rem auto;">
  <div class="fade-up">
    <h1 class="page-heading" style="text-align:center; margin-bottom:0.25rem;">
      Welcome <em>back</em>
    </h1>
    <p class="page-sub" style="text-align:center;">Enter the dream realm</p>
  </div>

  <div class="card fade-up fade-up-1">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required placeholder="your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;" type="submit">
        Enter →
      </button>
    </form>
    <hr>
    <p style="text-align:center; color:var(--muted); font-size:0.85rem;">
      No account? <a href="{{ url_for('register') }}" style="color:var(--accent); text-decoration:none;">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
