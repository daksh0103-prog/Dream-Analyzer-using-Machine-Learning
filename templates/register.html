{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div style="max-width:420px; margin:4rem auto;">
  <div class="fade-up">
    <h1 class="page-heading" style="text-align:center; margin-bottom:0.25rem;">
      Begin your <em>journey</em>
    </h1>
    <p class="page-sub" style="text-align:center;">Create your dream journal</p>
  </div>

  <div class="card fade-up fade-up-1">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required placeholder="choose a username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password" required placeholder="choose a password">
      </div>
      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;" type="submit">
        Create Account →
      </button>
    </form>
    <hr>
    <p style="text-align:center; color:var(--muted); font-size:0.85rem;">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent); text-decoration:none;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
